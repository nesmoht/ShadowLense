name: ShadowLense Dev Loop

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What should the Developer Agent build or fix?"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run build loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tools/build_loop.py "${{ github.event.inputs.task }}"

      - name: Commit changes if any
        run: |
          git config user.name "ShadowLense Dev Loop"
          git config user.email "devloop@shadowlense"
          git add -A
          git diff --staged --quiet || git commit -m "Dev loop: ${{ github.event.inputs.task }}"
          git push
